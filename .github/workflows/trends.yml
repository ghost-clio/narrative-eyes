name: Fetch Trends
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trends (douyin + weibo + bilibili)
        run: |
          mkdir -p data
          python3 scripts/fetch-douyin.py
          python3 scripts/fetch-weibo.py
          python3 scripts/fetch-bilibili.py

      - name: Update X trends note
        run: |
          echo '{"updated":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","note":"X trends fetched client-side from getdaytrends.com"}' > data/x-trends.json

      - name: Commit data
        run: |
          git config user.name "narrative-bot"
          git config user.email "bot@narrative.dev"
          git add data/
          git diff --staged --quiet || git commit -m "trends $(date -u +%H:%M)"
          git push
